name: Build Fizz Binaries

on:
  push:
    branches: [main]
    paths:
      - "third_party/fizz-rs/**"
      - "third_party/generated/**"
      - "third_party/compat/**"
      - "third_party/BUILD.bazel"
      - "examples/rpc-server/**"
      - "examples/rpc-client/**"
      - "MODULE.bazel"
      - "rust_cxx_bridge.bzl"
      - ".github/workflows/build-fizz.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: fizz-latest

jobs:
  fizz-sidecar:
    name: Build fizz-sidecar (C++, Bazel)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Bazelisk
        run: |
          sudo wget -qO /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      - name: Create placeholder cert files
        run: |
          touch third_party/fizz-rs/demo/fizz-sidecar/fizz.crt \
                third_party/fizz-rs/demo/fizz-sidecar/fizz.key

      - name: Build fizz-sidecar
        run: cd third_party/fizz-rs/demo/fizz-sidecar && bazel build :sidecar

      - name: Package binary
        run: |
          cp third_party/fizz-rs/demo/fizz-sidecar/bazel-bin/sidecar/main fizz-sidecar
          chmod +x fizz-sidecar

      - uses: actions/upload-artifact@v4
        with:
          name: fizz-sidecar
          path: fizz-sidecar

  rpc-binaries:
    name: Build RPC server + client (Rust, Bazel)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Bazelisk
        run: |
          sudo wget -qO /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      - name: Build rpc-server and rpc-client
        run: bazel build //examples/rpc-server //examples/rpc-client

      - name: Package binaries
        run: |
          cp bazel-bin/examples/rpc-server/rpc-server rpc-server
          cp bazel-bin/examples/rpc-client/rpc-client rpc-client
          chmod +x rpc-server rpc-client

      - uses: actions/upload-artifact@v4
        with:
          name: rpc-server
          path: rpc-server

      - uses: actions/upload-artifact@v4
        with:
          name: rpc-client
          path: rpc-client

  release:
    name: Upload to GitHub Release
    needs: [fizz-sidecar, rpc-binaries]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Delete existing release if it exists (idempotent update)
          gh release delete "$RELEASE_TAG" --yes 2>/dev/null || true
          git tag -d "$RELEASE_TAG" 2>/dev/null || true
          gh api -X DELETE "repos/${GH_REPO}/git/refs/tags/${RELEASE_TAG}" 2>/dev/null || true

          gh release create "$RELEASE_TAG" \
            --title "Fizz Pre-built Binaries" \
            --notes "Auto-built fizz-sidecar, rpc-server, and rpc-client binaries for Docker images." \
            --prerelease \
            artifacts/fizz-sidecar \
            artifacts/rpc-server \
            artifacts/rpc-client
